name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRの差分をレビューし、指摘をGitHubのインラインレビューコメントとして投稿してください。

            まず以下4つのエージェント定義ファイルを Read で読み込み、それぞれのペルソナ・責務・
            チェック観点に従ってレビューしてください（チェック項目はこのプロンプトに複製せず、
            各ファイルを都度読んで最新の基準を使うこと）。

            1. `.claude/agents/reviewer.md` — 常に適用。コード品質（単一責任・重複排除・適切な配置・
               未使用コード・パフォーマンス・React Native/Expo固有・エラーハンドリング）を確認する。
               「起動時プロトコル」に従い、差分だけでなくリポジトリ全体（lib/, components/, hooks/,
               app/, db/）をRead/Grepし、既存コードとの重複や不整合を能動的に探すこと。
            2. `.claude/agents/tester.md` — 関数・状態管理・DB操作などロジックの追加/変更を伴う場合のみ
               適用。既存テストのカバレッジ不足・境界値/異常系の考慮漏れを指摘する。
            3. `.claude/agents/designer.md` — UIの構造・レイアウト・インタラクションに影響する変更が
               ある場合のみ適用。タップターゲット・キーボード対応・空状態/エラー状態・一貫性・
               アクセシビリティを確認する。
            4. `.claude/agents/user-advisor.md` — 新機能追加またはUI変更を伴う場合のみ適用。ペルソナに
               従い、実際に使うシーンを想定した一人称視点のコメントを添える。

            各ファイルの「報告フォーマット」セクション（対話UI向けのテキスト報告形式）は無視してください。
            代わりに、指摘は 🔴Critical / 🟠Major / 🟡Minor / 🟢Suggestion で重篤度を分類し、
            ファイル名:行番号を明記した上で、下記の投稿方法に従ってください。良い点があれば
            1つ以上必ず言及してください。

            重要: あなたの最終応答テキストはどこにも表示・投稿されません。指摘は必ず
            `create_inline_comment` ツールを使ってファイル・行番号を指定してインラインコメントとして
            投稿してください。全体的な所感や良かった点はトップレベルのレビューコメントとして残してください。
          claude_args: >-
            --max-turns 40
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment"
          show_full_output: true
